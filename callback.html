<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Authorization</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 640px; margin: 60px auto; padding: 0 20px; line-height: 1.6; color: #222; }
  code { background: #f2f2f2; padding: 2px 6px; border-radius: 4px; }
  a { color: #fe2c55; }
</style>
</head>
<body>
<h2>Completing TikTok authorization…</h2>
<p>You can return to your terminal — the tokens are being saved automatically.</p>
<p>If this page doesn't redirect, make sure <code>npm run tiktok-auth</code> is still running, then <a id="manual" href="#">click here to finish</a>.</p>
<script>
  var target = "http://localhost:3131/callback" + window.location.search;
  document.getElementById("manual").href = target;
  window.location.replace(target);
</script>
</body>
